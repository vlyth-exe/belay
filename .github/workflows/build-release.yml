name: Build Release

on:
  release:
    types: [published]
  workflow_run:
    workflows: ["Release Please"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. belay-v0.3.0). Leave empty to build from main."
        required: false
        type: string
      use_main:
        description: "Build from main instead of a tag"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    if: >
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
          - os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Resolve ref to check out
        id: ref
        shell: node {0}
        run: |
          const fs = require('fs');
          const https = require('https');

          const useMain = '${{ inputs.use_main }}' === 'true';
          const releaseTag = '${{ github.event.release.tag_name }}';
          const inputTag = '${{ inputs.tag }}';

          // 1. Explicit use_main flag — just use main
          if (useMain) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'ref=main\n');
            console.log('ref=main (use_main flag)');
            return;
          }

          // 2. Release event or explicit tag input
          const tag = releaseTag || inputTag;
          if (tag) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `ref=${tag}\n`);
            console.log(`ref=${tag} (from ${releaseTag ? 'release event' : 'input'})`);
            return;
          }

          // 3. workflow_run — fetch latest release tag via GitHub API
          const url = `https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}/releases?per_page=1`;
          const options = {
            headers: {
              'User-Agent': 'actions',
              Authorization: `token ${process.env.GITHUB_TOKEN}`,
            },
          };

          https.get(url, options, (res) => {
            let body = '';
            res.on('data', (chunk) => (body += chunk));
            res.on('end', () => {
              try {
                const releases = JSON.parse(body);
                if (!Array.isArray(releases) || releases.length === 0) {
                  console.error('No releases found');
                  process.exit(1);
                }
                const t = releases[0].tag_name;
                fs.appendFileSync(process.env.GITHUB_OUTPUT, `ref=${t}\n`);
                console.log(`ref=${t} (from GitHub API)`);
              } catch (err) {
                console.error('Failed to parse releases:', err.message);
                process.exit(1);
              }
            });
          }).on('error', (err) => {
            console.error('API request failed:', err.message);
            process.exit(1);
          });

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Generate macOS icon
        if: runner.os == 'macOS'
        run: |
          mkdir -p Belay.iconset
          sips -z 16 16     public/Belay.png --out Belay.iconset/icon_16x16.png
          sips -z 32 32     public/Belay.png --out Belay.iconset/icon_16x16@2x.png
          sips -z 32 32     public/Belay.png --out Belay.iconset/icon_32x32.png
          sips -z 64 64     public/Belay.png --out Belay.iconset/icon_32x32@2x.png
          sips -z 128 128   public/Belay.png --out Belay.iconset/icon_128x128.png
          sips -z 256 256   public/Belay.png --out Belay.iconset/icon_128x128@2x.png
          sips -z 256 256   public/Belay.png --out Belay.iconset/icon_256x256.png
          sips -z 512 512   public/Belay.png --out Belay.iconset/icon_256x256@2x.png
          sips -z 512 512   public/Belay.png --out Belay.iconset/icon_512x512.png
          sips -z 1024 1024 public/Belay.png --out Belay.iconset/icon_512x512@2x.png
          iconutil -c icns Belay.iconset -o public/Belay.icns

      - name: Install npm dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Package and publish
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Resolve ref to check out
        id: ref
        shell: node {0}
        run: |
          const fs = require('fs');
          const https = require('https');

          const useMain = '${{ inputs.use_main }}' === 'true';
          const releaseTag = '${{ github.event.release.tag_name }}';
          const inputTag = '${{ inputs.tag }}';

          if (useMain) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'ref=main\n');
            console.log('ref=main (use_main flag)');
            return;
          }

          const tag = releaseTag || inputTag;
          if (tag) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `ref=${tag}\n`);
            console.log(`ref=${tag} (from ${releaseTag ? 'release event' : 'input'})`);
            return;
          }

          const url = `https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}/releases?per_page=1`;
          const options = {
            headers: {
              'User-Agent': 'actions',
              Authorization: `token ${process.env.GITHUB_TOKEN}`,
            },
          };

          https.get(url, options, (res) => {
            let body = '';
            res.on('data', (chunk) => (body += chunk));
            res.on('end', () => {
              try {
                const releases = JSON.parse(body);
                if (!Array.isArray(releases) || releases.length === 0) {
                  console.error('No releases found');
                  process.exit(1);
                }
                const t = releases[0].tag_name;
                fs.appendFileSync(process.env.GITHUB_OUTPUT, `ref=${t}\n`);
                console.log(`ref=${t} (from GitHub API)`);
              } catch (err) {
                console.error('Failed to parse releases:', err.message);
                process.exit(1);
              }
            });
          }).on('error', (err) => {
            console.error('API request failed:', err.message);
            process.exit(1);
          });

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync npm package version from root package.json
        run: |
          node -e "
            const fs = require('fs');
            const root = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const pkg = JSON.parse(fs.readFileSync('packages/belay-code/package.json', 'utf8'));
            pkg.version = root.version;
            fs.writeFileSync('packages/belay-code/package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Synced belay-app version to', root.version);
          "

      - name: Publish to npm
        run: npm publish --access public
        working-directory: packages/belay-code
